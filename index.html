<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAUCÁ • Manutenção</title>

  <!-- Fonte -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{
      width:100%;
      height:100%;
    }

    body{
      background:#FFF8F1;
      font-family:'Plus Jakarta Sans', sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      padding:24px;
    }

    .page{
      width:100%;
      max-width:1400px;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
    }

    .content{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:34px;
      text-align:center;
      z-index:2;
    }

    .logo{
      width:min(440px, 72vw);
      height:auto;
      display:block;
    }

    .text{
      font-size:clamp(16px, 2vw, 24px);
      font-weight:400;
      color:#626262;
      letter-spacing:-0.02em;
    }

    .wood{
      position:absolute;
      width:min(420px, 42vw);
      height:auto;
      opacity:0.95;
    }

    /* Desktop padrão */
    .wood.top{
      top:14%;
      left:50%;
      transform:translateX(-50%);
    }

    .wood.bottom{
      bottom:14%;
      left:50%;
      transform:translateX(-50%);
    }

    /* Telas muito grandes */
    @media (min-width: 1400px){
      .wood.top{
        top:18%;
      }

      .wood.bottom{
        bottom:18%;
      }
    }

    /* Tablet */
    @media (max-width: 900px){
      .content{
        gap:26px;
      }

      .wood{
        width:min(320px, 55vw);
      }

      .wood.top{
        top:10%;
      }

      .wood.bottom{
        bottom:10%;
      }
    }

    /* Mobile */
    @media (max-width: 600px){
      body{
        padding:18px;
      }

      .logo{
        width:78vw;
      }

      .text{
        font-size:18px;
      }

      .wood{
        width:68vw;
      }

      .wood.top{
        top:12%;
      }

      .wood.bottom{
        bottom:12%;
      }
    }
  </style>
</head>
<body>

  <main class="page">

    <!-- Tábua superior -->
    <img src="wood-cauca.svg" alt="" class="wood top">

    <!-- Conteúdo central -->
    <section class="content">
      <img src="Principal-Horizontal.svg" alt="CAUCÁ" class="logo">
      <p class="text">Estamos em manutenção</p>
    </section>

    <!-- Tábua inferior -->
    <img src="wood-cauca.svg" alt="" class="wood bottom">

  </main>

</body>
</html>
